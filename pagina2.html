<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welke school past bij jouw kind?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="quiz-page">
  <button id="menuToggle" aria-label="Open menu">➤</button>

  <nav id="sideMenu">
    <a href="pagina1.html" data-i18n="navSchoolInfo">Schoolinformatie</a>
    <a href="pagina2.html" data-i18n="navSchoolFit">Welke school past bij jouw kind?</a>
    <a href="pagina3.html" data-i18n="navSchools">Onze scholen</a>
    <a href="pagina4.html" data-i18n="navContact">Contact</a>
    <a href="index.html" style="padding: 40px; display:block;" data-i18n="navHome">Home</a>
  </nav>

  <div class="translate-controls" id="translateControls">
    <button id="languageToggle" class="language-toggle" type="button" aria-expanded="false" aria-controls="languageMenu" aria-label="Kies een taal">
      <span id="languageToggleFlag">🇳🇱 / 🇳🇱</span>
    </button>
    <div id="languageMenu" class="language-menu" hidden>
      <button type="button" data-language-option="nl">🇳🇱 NL</button>
      <button type="button" data-language-option="en">🇬🇧 EN</button>
      <button type="button" data-language-option="de">🇩🇪 DE</button>
      <button type="button" data-language-option="fr">🇫🇷 FR</button>
      <button type="button" data-language-option="es">🇪🇸 ES</button>
    </div>
    <label for="languageSelect" class="sr-only" data-i18n="translateLabel">Vertaal de hele pagina:</label>
    <select id="languageSelect" aria-label="Kies een taal" class="sr-only">
      <option value="nl">Nederlands</option>
      <option value="en">English</option>
      <option value="de">Deutsch</option>
      <option value="fr">Français</option>
      <option value="es">Español</option>
    </select>
  </div>

  <main class="quiz-wrapper">
    <header class="quiz-header">
      <p class="quiz-kicker">PCPO Schoolmatch</p>
      <h1 data-i18n="quizTitle">welke school past bij jouw kind?</h1>
      <p class="quiz-subtitle">Ontdek in een paar stappen welke school het best aansluit.</p>
    </header>

    <section class="quiz-card" aria-live="polite">
      <div id="quizIntro" class="quiz-intro">
        <label for="quizAddressInput" data-i18n="quizAddressLabel">Vul eerst je adres in:</label>
        <div class="quiz-address-row">
          <input id="quizAddressInput" type="text" data-i18n-placeholder="quizAddressPlaceholder" placeholder="Bijvoorbeeld: Achterom 70, Barendrecht">
          <button id="quizAddressStart" type="button" data-i18n="quizAddressButton">Start quiz</button>
        </div>
        <p id="quizAddressStatus" class="quiz-address-status"></p>
      </div>

      <div id="quizQuestionWrap" hidden>
        <p class="quiz-progress" id="quizProgress">Vraag 1 van 9</p>
        <h2 id="quizQuestion">Laden...</h2>
        <div id="quizOptions" class="quiz-options"></div>
      </div>

      <div id="quizResults" class="quiz-results" hidden>
        <h2 data-i18n="quizResultsTitle">Ranglijst best passende scholen</h2>
        <p class="quiz-top-match" id="quizTopMatch"></p>
        <ol id="quizRanking"></ol>
        <a id="quizReadMoreLink" href="pagina3.html" class="quiz-read-more-link"></a>
        <button id="restartQuiz" type="button" data-i18n="quizRestart">Quiz opnieuw doen</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
