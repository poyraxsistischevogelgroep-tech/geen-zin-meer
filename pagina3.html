<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onze scholen</title>
  <link rel="stylesheet" href="style.css">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <style>
    :root {
      --blue: #38B6FF;
      --text: #1f2937;
      --muted: #6b7280;
      --bg-soft: #f8fafc;
      --white: #ffffff;
      --border: #d1d5db;
      --accent: #e11d48;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(56, 182, 255, 0.26), transparent 40%),
        radial-gradient(circle at 88% 0%, rgba(17, 163, 198, 0.2), transparent 35%),
        linear-gradient(170deg, #eef8ff 0%, #f7fbff 55%, #eef6ff 100%);
      line-height: 1.45;
    }

    .page {
      max-width: 1280px;
      margin: 34px auto 56px;
      padding: 0 22px;
    }

    h1 {
      text-align: center;
      color: #0e5c92;
      margin: 4px 0 26px;
      font-size: clamp(2rem, 3.2vw, 2.7rem);
      letter-spacing: 0.3px;
      text-shadow: 0 2px 10px rgba(56, 182, 255, 0.22);
    }

    .card {
      background: rgba(255, 255, 255, 0.8);
      border-radius: 22px;
      border: 1px solid rgba(154, 202, 240, 0.55);
      box-shadow: 0 20px 34px rgba(18, 70, 120, 0.12);
      padding: 18px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      margin-bottom: 12px;
      align-items: start;
      position: relative;
    }

    #addressInput {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #b7d7f6;
      border-radius: 999px;
      font-size: 16px;
      background: #f9fdff;
      box-shadow: inset 0 1px 3px rgba(56, 182, 255, 0.2);
    }

    #searchButton,
    #fullscreenMapButton,
    #openTopFilterButton,
    #applyTopFilterButton {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      background: linear-gradient(130deg, #0e7cc3, #13a3c6);
      color: var(--white);
      font-weight: 700;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(10, 112, 173, 0.24);
    }

    .top-filter {
      position: absolute;
      top: 56px;
      right: 0;
      width: 280px;
      padding: 14px;
      border: 1px solid #b9daf8;
      border-radius: 16px;
      background: linear-gradient(175deg, #ffffff, #f4faff);
      box-shadow: 0 16px 28px rgba(14, 108, 171, 0.22);
      z-index: 700;
      display: none;
    }

    .top-filter.open { display: block; }

    .top-filter__title {
      margin: 0 0 8px;
      color: var(--accent);
      font-weight: 700;
    }

    .city-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      font-size: 15px;
    }

    .city-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #334155;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 0 6px;
    }

    #applyTopFilterButton {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: var(--accent);
    }

    .map-shell {
      width: 100%;
      margin: 10px 0 14px;
      position: relative;
    }

    #schoolMap {
      width: 100%;
      height: 470px;
      border-radius: 18px;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.06), 0 12px 24px rgba(15, 23, 42, 0.12);
      margin: 0;
    }

    #fullscreenMapButton {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 500;
      padding: 8px 12px;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.25);
    }

    .map-shell.is-fullscreen {
      position: fixed;
      inset: 18px;
      isolation: isolate;
      width: auto;
      height: auto;
      margin: 0;
      z-index: 12000;
      background: var(--white);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.35);
    }

    .map-shell.is-fullscreen #schoolMap { height: calc(100vh - 56px); }

    #statusMessage {
      margin: 0;
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .results-title {
      margin: 8px 0 8px;
      font-size: 15px;
      font-weight: 700;
    }

    #nearestSchools {
      list-style-position: inside;
      margin: 0;
      padding: 10px 12px;
      background: var(--bg-soft);
      border-radius: 10px;
    }

    #nearestSchools li { padding: 3px 0; }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .school-cards-grid {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .school-card {
      position: relative;
      background: linear-gradient(140deg, #0d3d66 0%, #11639e 55%, #13a3c6 100%);
      border: 0;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 18px 34px rgba(8, 55, 96, 0.28);
      display: flex;
      flex-direction: column;
      min-height: 345px;
      transform: perspective(900px) rotateX(0.3deg);
    }

    .school-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.2), transparent 40%),
        radial-gradient(circle at 85% 12%, rgba(255, 255, 255, 0.25), transparent 38%);
      pointer-events: none;
    }

    .school-card__logo {
      height: 124px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.93);
      clip-path: polygon(0 0, 100% 0, 100% 82%, 0 100%);
      padding: 16px;
      z-index: 1;
    }

    .school-card__logo img {
      max-width: 86%;
      max-height: 92px;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.18));
    }

    .school-card__body {
      padding: 14px 16px 16px;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1;
      color: #f0f9ff;
    }

    .school-card__name {
      margin: 0;
      color: #ffffff;
      font-size: 23px;
      line-height: 1.15;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    .school-card__city {
      display: inline-flex;
      align-self: flex-start;
      margin-top: 2px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.34);
      color: #f6fdff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
      backdrop-filter: blur(2px);
    }

    .school-card__meta {
      margin: 0;
      color: #e0f5ff;
      font-size: 13px;
      line-height: 1.45;
      max-width: 92%;
    }

    .school-card__actions {
      margin-top: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding-top: 8px;
    }

    .school-card__actions a {
      text-align: center;
      text-decoration: none;
      padding: 10px 8px;
      border-radius: 11px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.9);
      color: #0d4b79;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 8px 14px rgba(7, 42, 69, 0.18);
    }

    .school-card__actions a:last-child {
      background: #ffe26f;
      color: #5f4200;
    }

    .school-card__actions a:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 18px rgba(5, 29, 49, 0.24);
    }

    @media (max-width: 720px) {
      .controls { grid-template-columns: 1fr; }
      #searchButton,
      #openTopFilterButton { width: 100%; }
      .top-filter {
        position: static;
        width: 100%;
      }
      #schoolMap { height: 420px; }
      .map-shell.is-fullscreen { inset: 8px; }
      .map-shell.is-fullscreen #schoolMap { height: calc(100vh - 44px); }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 data-i18n="mapTitle">Onze scholen</h1>

    <section class="card" aria-label="Kaart en schoolzoeker" data-i18n-aria-label="mapSectionAria">
      <div class="controls">
        <input id="addressInput" type="text" placeholder="Vul adres in" aria-label="Vul adres in" data-i18n-placeholder="mapSearchPlaceholder" data-i18n-aria-label="mapSearchPlaceholder">
        <button id="searchButton" type="button" data-i18n="mapSearchButton">Zoeken</button>
        <button id="openTopFilterButton" type="button" data-i18n="mapFilterLocations">Filter locaties</button>

        <div id="topFilterPanel" class="top-filter" aria-label="Filter locaties" data-i18n-aria-label="mapFilterLocations">
          <p class="top-filter__title" data-i18n="mapCity">Stad</p>
          <label class="city-check" for="cityBarendrechtCheck">
            <input id="cityBarendrechtCheck" type="checkbox" checked>
            Barendrecht <span id="countBarendrecht" class="city-count">0</span>
          </label>
          <label class="city-check" for="cityRidderkerkCheck">
            <input id="cityRidderkerkCheck" type="checkbox" checked>
            Ridderkerk <span id="countRidderkerk" class="city-count">0</span>
          </label>
          <button id="applyTopFilterButton" type="button" data-i18n="mapFilterButton">Filter</button>
        </div>
      </div>

      <p id="statusMessage" aria-live="polite" data-i18n="mapStatusFilterActive"></p>
      <div id="mapShell" class="map-shell">
        <button id="fullscreenMapButton" type="button" data-i18n="mapFullscreen">Schermvullend</button>
        <div id="schoolMap" aria-label="Kaart met schoollocaties" data-i18n-aria-label="mapAria"></div>
      </div>

      <p class="results-title" data-i18n="mapResultsTitle">Scholen op afstand (dichtstbij eerst)</p>
      <ol id="nearestSchools"></ol>
      <p class="hint" data-i18n="mapHint">Tip: beweeg met je muis over een blauwe marker om naam en adres te zien.</p>
    </section>

    <section aria-label="Scholenoverzicht" data-i18n-aria-label="mapSchoolOverviewAria">
      <div id="schoolCardsGrid" class="school-cards-grid"></div>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const schoolLocations = [
      { name: 'CBS De Ark', address: 'Klipper 108-109, 2991 KM Barendrecht', city: 'Barendrecht', lat: 51.85667, lon: 4.53472, website: 'http://www.cbsdearkbarendrecht.nl/' },
      { name: 'CBS De Bongerd', address: 'Patrijs 28-29, 2986 CA Ridderkerk', city: 'Ridderkerk', lat: 51.8646633, lon: 4.6135642, website: 'https://www.cbsdebongerd.nl/' },
      { name: 'CBS De Fontein', address: 'Scheldeplein 4, 2987 EL Ridderkerk', city: 'Ridderkerk', lat: 51.8912258, lon: 4.5790103, website: 'https://www.fonteinbolnes.nl/' },
      { name: 'CBS De Hoeksteen', address: 'Kruidentuin 6A, 2991 RK Barendrecht', city: 'Barendrecht', lat: 51.852674755859375, lon: 4.547271728515625, website: 'https://www.dehoeksteen-cbs.nl/' },
      { name: 'CBS De Klimop', address: 'Meester Treubstraat 3, 2982 VN Ridderkerk', city: 'Ridderkerk', lat: 51.871284, lon: 4.5914643, website: 'https://cbsdeklimopridderkerk.nl/' },
      { name: 'CBS De Regenboog', address: 'Reijerweg 60, 2983 AT Ridderkerk', city: 'Ridderkerk', lat: 51.885218, lon: 4.6051965, website: 'https://www.regenboogridderkerk.nl/' },
      { name: 'CBS De Vrijenburg', address: 'Vrijenburglaan 61, 2994 CD Barendrecht', city: 'Barendrecht', lat: 51.8589301, lon: 4.5062779, website: 'https://www.cbsdevrijenburg.nl/' },
      { name: 'CBS De Wingerd', address: 'Da Costalaan 3, 2985 BC Ridderkerk', city: 'Ridderkerk', lat: 51.8627854, lon: 4.6042018, website: 'http://www.cbsdewingerd-ridderkerk.nl/' },
      { name: 'CBS Groen van Prinsterer (Stellingmolen)', address: 'Stellingmolen 10, 2992 DN Barendrecht', city: 'Barendrecht', lat: 51.85, lon: 4.5295, website: 'https://www.prinsterer.nl/' },
      { name: 'CBS Groen van Prinsterer (Hof van Maxima)', address: 'Hedwigepolder 2, 2992 TS Barendrecht', city: 'Barendrecht', lat: 51.845301, lon: 4.5265, website: 'https://www.prinsterer.nl/' },
      { name: 'CBS Het Kompas', address: 'Hoefslag 20, 2992 VH Barendrecht', city: 'Barendrecht', lat: 51.8569395, lon: 4.5293586, website: 'https://www.kompasbarendrecht.nl/' },
      { name: 'CBS Smitshoek (Riederhof)', address: 'Riederhof 37, 2993 XJ Barendrecht', city: 'Barendrecht', lat: 51.85424313964844, lon: 4.491832669830322, website: 'https://www.cbssmitshoek.nl/' },
      { name: 'CBS Smitshoek (Brandsma-akker)', address: 'Brandsma-akker 3, 2994 AA Barendrecht', city: 'Barendrecht', lat: 51.857628411865234, lon: 4.493868350982666, website: 'https://www.cbssmitshoek.nl/' },
      { name: 'CBS Smitshoek (Kouwenhoven-akker)', address: 'Kouwenhoven-akker 14, 2994 AS Barendrecht', city: 'Barendrecht', lat: 51.8597538, lon: 4.4940023, website: 'https://www.cbssmitshoek.nl/' },
      { name: 'PCPO Bestuursbureau', address: 'Achterom 70, 2991 CV Barendrecht', city: 'Barendrecht', lat: 51.85496, lon: 4.5384424, website: 'https://www.werkenbijpcpobr.nl/' }
    ];

    const map = L.map('schoolMap').setView([51.8575, 4.55], 12);
    const addressInput = document.getElementById('addressInput');
    const searchButton = document.getElementById('searchButton');
    const openTopFilterButton = document.getElementById('openTopFilterButton');
    const topFilterPanel = document.getElementById('topFilterPanel');
    const applyTopFilterButton = document.getElementById('applyTopFilterButton');
    const cityBarendrechtCheck = document.getElementById('cityBarendrechtCheck');
    const cityRidderkerkCheck = document.getElementById('cityRidderkerkCheck');
    const countBarendrecht = document.getElementById('countBarendrecht');
    const countRidderkerk = document.getElementById('countRidderkerk');
    const mapShell = document.getElementById('mapShell');
    const fullscreenMapButton = document.getElementById('fullscreenMapButton');
    const statusMessage = document.getElementById('statusMessage');
    const nearestSchools = document.getElementById('nearestSchools');
    const schoolCardsGrid = document.getElementById('schoolCardsGrid');

    function t(key, fallback = '') {
      return window.getLocaleText ? (window.getLocaleText(key) || fallback) : fallback;
    }

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let userMarker = null;
    let filteredSchools = [...schoolLocations];
    const schoolMarkersLayer = L.layerGroup().addTo(map);

    const redIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    const blueIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    function setStatus(message) {
      statusMessage.textContent = message;
    }

    function haversineDistanceKm(lat1, lon1, lat2, lon2) {
      const toRad = (deg) => deg * (Math.PI / 180);
      const earthRadiusKm = 6371;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2
        + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return earthRadiusKm * c;
    }

    function getSelectedCities() {
      const selected = [];
      if (cityBarendrechtCheck.checked) selected.push('Barendrecht');
      if (cityRidderkerkCheck.checked) selected.push('Ridderkerk');
      return selected;
    }

    function applyFiltersToData() {
      const selectedCities = getSelectedCities();
      filteredSchools = selectedCities.length
        ? schoolLocations.filter((school) => selectedCities.includes(school.city))
        : [];
    }

    function renderSchoolMarkers() {
      const bounds = L.latLngBounds();
      schoolMarkersLayer.clearLayers();

      filteredSchools.forEach((school) => {
        const marker = L.marker([school.lat, school.lon], { icon: blueIcon }).addTo(schoolMarkersLayer);
        marker.bindTooltip(`<strong>${school.name}</strong><br>${school.address}`, {
          direction: 'top',
          sticky: true,
          opacity: 0.95
        });
        marker.on('mouseover', () => marker.openTooltip());
        marker.on('mouseout', () => marker.closeTooltip());
        bounds.extend([school.lat, school.lon]);
      });

      if (bounds.isValid()) {
        map.fitBounds(bounds.pad(0.12));
      }
    }

    function renderNearestSchools(userLat, userLon) {
      nearestSchools.innerHTML = '';

      const sortedSchools = filteredSchools
        .map((school) => ({
          ...school,
          distance: haversineDistanceKm(userLat, userLon, school.lat, school.lon)
        }))
        .sort((a, b) => a.distance - b.distance);

      sortedSchools.forEach((school) => {
        const li = document.createElement('li');
        li.textContent = `${school.name} - ${school.distance.toFixed(2)} km`;
        nearestSchools.appendChild(li);
      });
    }

    function getSchoolLogoByIndex(index) {
      if (index === 8) return 'images/logo10.webp';
      if (index === 12 || index === 13) return 'images/logo12.webp';
      if (index === 14) return 'images/logo.png';
      return `images/logo${(index % 12) + 1}.webp`;
    }

    function getSchoolLogoBySchool(school) {
      const originalIndex = schoolLocations.findIndex((item) => item.name === school.name && item.address === school.address);
      return getSchoolLogoByIndex(originalIndex >= 0 ? originalIndex : 0);
    }

    function getSchoolsSortedForCards() {
      if (!userMarker) return [...filteredSchools];

      const userCoords = userMarker.getLatLng();
      return [...filteredSchools].sort((a, b) => {
        const distanceA = haversineDistanceKm(userCoords.lat, userCoords.lng, a.lat, a.lon);
        const distanceB = haversineDistanceKm(userCoords.lat, userCoords.lng, b.lat, b.lon);
        return distanceA - distanceB;
      });
    }

    function renderSchoolCards() {
      schoolCardsGrid.innerHTML = '';

      const schoolsForCards = getSchoolsSortedForCards();

      schoolsForCards.forEach((school) => {
        const card = document.createElement('article');
        card.className = 'school-card';
        card.innerHTML = `
          <div class="school-card__logo">
            <img src="${getSchoolLogoBySchool(school)}" alt="${t('mapLogoAltPrefix','Logo van')} ${school.name}">
          </div>
          <div class="school-card__body">
            <h3 class="school-card__name">${school.name}</h3>
            <span class="school-card__city">${school.city}</span>
            <p class="school-card__meta">📍 ${school.address}</p>
            <p class="school-card__meta">${t('mapCardContact','✉️ Neem contact op met de school voor meer info.')}</p>
            <div class="school-card__actions">
              <a href="#" role="button">${t('mapCardMoreInfo','Meer info')}</a>
              <a href="${school.website || '#'}" role="button"${school.website ? ' target=\"_blank\" rel=\"noopener noreferrer\"' : ''}>${t('mapCardWebsite','Website')}</a>
            </div>
          </div>
        `;
        schoolCardsGrid.appendChild(card);
      });
    }

    function updateCityCounts() {
      countBarendrecht.textContent = schoolLocations.filter((school) => school.city === 'Barendrecht').length;
      countRidderkerk.textContent = schoolLocations.filter((school) => school.city === 'Ridderkerk').length;
    }

    function applyAllFilters() {
      applyFiltersToData();
      renderSchoolMarkers();
      renderSchoolCards();

      if (userMarker) {
        const userCoords = userMarker.getLatLng();
        renderNearestSchools(userCoords.lat, userCoords.lng);
      } else {
        nearestSchools.innerHTML = '';
      }

      if (!filteredSchools.length) {
        setStatus(t('mapStatusNoSchools','Geen scholen gevonden voor deze filter.'));
      } else {
        setStatus(t('mapStatusFilterActive','Filter actief. Beweeg met de muis over een marker om naam en adres te zien.'));
      }
    }

    function toggleMapFullscreen() {
      mapShell.classList.toggle('is-fullscreen');
      const isFullscreen = mapShell.classList.contains('is-fullscreen');
      fullscreenMapButton.textContent = isFullscreen ? t('mapFullscreenExit','Verkleinen') : t('mapFullscreen','Schermvullend');
      document.body.style.overflow = isFullscreen ? 'hidden' : '';
      setTimeout(() => map.invalidateSize(), 160);
    }

    async function fetchJson(endpoint) {
      const response = await fetch(endpoint);
      if (!response.ok) {
        throw new Error(t('mapLookupFailed','Adres opzoeken mislukt'));
      }
      return response.json();
    }

    async function geocodeAddress(address) {
      const query = encodeURIComponent(`${address}, Nederland`);
      const nominatimEndpoint = `https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=nl&q=${query}`;

      try {
        const nominatimData = await fetchJson(nominatimEndpoint);
        if (nominatimData.length) {
          return {
            lat: Number(nominatimData[0].lat),
            lon: Number(nominatimData[0].lon)
          };
        }
      } catch (error) {
        console.warn('Nominatim lookup failed, trying Photon fallback.', error);
      }

      const photonEndpoint = `https://photon.komoot.io/api/?limit=1&lang=nl&q=${query}`;
      const photonData = await fetchJson(photonEndpoint);
      const firstFeature = photonData.features?.[0];
      if (!firstFeature) return null;

      return {
        lat: Number(firstFeature.geometry.coordinates[1]),
        lon: Number(firstFeature.geometry.coordinates[0])
      };
    }

    async function handleSearch() {
      const inputValue = addressInput.value.trim();
      if (!inputValue) {
        setStatus(t('mapStatusFillAddress','Vul eerst een adres in.'));
        return;
      }

      setStatus(t('mapStatusSearching','Adres zoeken...'));
      searchButton.disabled = true;

      try {
        const location = await geocodeAddress(inputValue);
        if (!location) {
          setStatus(t('mapStatusNotFound','Adres niet gevonden. Probeer een vollediger adres.'));
          return;
        }

        if (userMarker) {
          map.removeLayer(userMarker);
        }

        userMarker = L.marker([location.lat, location.lon], { icon: redIcon }).addTo(map);
        userMarker.bindTooltip(t('mapYourAddress','Jouw adres'), {
          direction: 'top',
          sticky: true,
          opacity: 0.95
        }).openTooltip();

        renderNearestSchools(location.lat, location.lon);
        renderSchoolCards();
        map.setView([location.lat, location.lon], 13);
        setStatus(t('mapStatusFound','Adres gevonden. Scholen staan hieronder van dichtbij naar verder.'));
      } catch (error) {
        console.error(error);
        setStatus(t('mapStatusFailed','Zoeken mislukt. Controleer het adres en probeer opnieuw.'));
      } finally {
        searchButton.disabled = false;
      }
    }

    searchButton.addEventListener('click', handleSearch);
    applyTopFilterButton.addEventListener('click', () => {
      applyAllFilters();
      topFilterPanel.classList.remove('open');
    });

    openTopFilterButton.addEventListener('click', () => {
      topFilterPanel.classList.toggle('open');
    });

    addressInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        handleSearch();
      }
    });

    fullscreenMapButton.addEventListener('click', toggleMapFullscreen);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && mapShell.classList.contains('is-fullscreen')) {
        toggleMapFullscreen();
      }
      if (event.key === 'Escape' && topFilterPanel.classList.contains('open')) {
        topFilterPanel.classList.remove('open');
      }
    });

    updateCityCounts();
    applyAllFilters();

    document.addEventListener('languageChanged', () => {
      applyAllFilters();
      if (!mapShell.classList.contains('is-fullscreen')) {
        fullscreenMapButton.textContent = t('mapFullscreen','Schermvullend');
      }
    });
  </script>
